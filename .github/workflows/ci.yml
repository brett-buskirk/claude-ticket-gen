name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24' # aligned with publish.yml
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      # Tests slot in here once #39 lands the Vitest suite (the `test` script is a
      # placeholder today, so running it now would fail the gate):
      #   - run: npm test
