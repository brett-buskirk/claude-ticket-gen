# =============================================================================
# Claude Issue Generator for OffGrid Ops
# =============================================================================
# This workflow parses your existing CLAUDE.md roadmap format and creates
# GitHub issues for pending items.
#
# TRIGGERS:
#   1. Manual dispatch from Actions tab (recommended for first run)
#   2. Comment "@claude generate issues" on any issue
#
# =============================================================================

name: Claude Issue Generator

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview issues without creating them'
        required: false
        default: 'true'
        type: boolean
      phase:
        description: 'Specific phase to process (e.g., "Phase 6" or "all")'
        required: false
        default: 'all'
        type: string
      include_optional:
        description: 'Include items marked as OPTIONAL'
        required: false
        default: 'false'
        type: boolean
      min_priority:
        description: 'Minimum priority to include (0-3, where 0 is highest)'
        required: false
        default: '3'
        type: string

  issue_comment:
    types: [created]

jobs:
  generate-issues:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, '@claude generate issues'))
    
    runs-on: ubuntu-latest
    
    # IMPORTANT: All three permissions are required
    permissions:
      contents: read       # Read CLAUDE.md and codebase
      issues: write        # Create and label issues
      id-token: write      # Required for OIDC authentication
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse phase from comment (if triggered by comment)
        id: parse_comment
        if: github.event_name == 'issue_comment'
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Extract phase if specified: "@claude generate issues for Phase 6"
          if [[ "$COMMENT" =~ "for Phase "([0-9]+) ]]; then
            echo "phase=Phase ${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "phase=all" >> $GITHUB_OUTPUT
          fi
          # Check for dry run flag
          if [[ "$COMMENT" =~ "--dry-run" ]] || [[ "$COMMENT" =~ "preview" ]]; then
            echo "dry_run=true" >> $GITHUB_OUTPUT
          else
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate issues from CLAUDE.md
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # The prompt that instructs Claude on what to do
          prompt: |
            # Task: Parse CLAUDE.md and Create GitHub Issues
            
            You are a project manager assistant for the OffGrid Ops project. Your task is to 
            read the CLAUDE.md file and create GitHub issues for pending roadmap items.

            ## Configuration
            - **Dry Run:** ${{ github.event_name == 'issue_comment' && steps.parse_comment.outputs.dry_run || inputs.dry_run }}
            - **Target Phase:** ${{ github.event_name == 'issue_comment' && steps.parse_comment.outputs.phase || inputs.phase || 'all' }}
            - **Include Optional:** ${{ inputs.include_optional || 'false' }}
            - **Minimum Priority:** P${{ inputs.min_priority || '3' }} (include P0-P${{ inputs.min_priority || '3' }})

            ## Step 1: Read and Parse CLAUDE.md

            Read the CLAUDE.md file and identify:

            1. **Phases** - Look for headers like:
               - `### Phase 6: Sync Engine (PENDING)` 
               - `### 📋 Phase 6: Sync Engine (PENDING)`
               Extract: phase number, name, status (COMPLETED/PENDING)

            2. **Phase Metadata** - After each phase header, look for:
               - `**Goals:**` - Description of the phase
               - `**Milestone:**` - Target milestone name
               - `**Target:**` - Target date (e.g., "Q2 2026")
               - `**Labels:**` - Suggested labels (e.g., `phase-6`, `sync`)

            3. **Tasks** - Checkbox items under each phase:
               - `- [ ]` = Pending (CREATE ISSUE)
               - `- [x]` = Completed (SKIP)
               
            4. **Priority Tags** - Optional priority markers:
               - `[P0]` = Critical (label: priority-critical)
               - `[P1]` = High (label: priority-high)  
               - `[P2]` = Medium (label: priority-medium)
               - `[P3]` = Low/Nice-to-have (label: priority-low)
               - No tag = Default to P2

            5. **Special Markers:**
               - `[BUG]` = Bug fix (label: bug)
               - `[TECH-DEBT]` = Technical debt (label: tech-debt)
               - `- OPTIONAL` suffix = Optional feature (label: optional)
               - Items under "Known Issues & Tech Debt" section

            6. **Nested Items** - Some tasks have sub-items (indented checkboxes):
               - Include sub-items in the issue body as a checklist
               - Don't create separate issues for sub-items

            ## Step 2: Check for Existing Issues

            Before creating each issue, search for existing issues to avoid duplicates:
            
            ```bash
            gh issue list --search "KEYWORDS from task" --state all --limit 10
            ```

            Consider an issue a duplicate if:
            - Title is very similar (>80% keyword overlap)
            - Description matches the task intent
            
            Skip duplicates and note them in your summary.

            ## Step 3: Create Issues (or Preview in Dry Run)

            For each NEW pending item that matches the filters:

            **Issue Title Format:**
            - Use imperative mood: "Implement X" not "X implementation"
            - Include phase prefix for context: `[Phase 6] Implement sync queue`
            - Keep under 80 characters

            **Issue Body Template:**
            ```markdown
            ## Description
            [Task description from CLAUDE.md]

            ## Context
            - **Phase:** [Phase name and number]
            - **Priority:** [P0/P1/P2/P3]
            - **Target:** [Target date if specified]

            ## Acceptance Criteria
            - [ ] [Inferred from task description]
            - [ ] [Sub-items if present]
            - [ ] Tests pass
            - [ ] Documentation updated (if applicable)

            ## Related
            - Part of: [Phase name]
            - Dependencies: [Any mentioned dependencies]

            ---
            *Auto-generated from CLAUDE.md roadmap*
            ```

            **Labels to Apply:**
            - Phase label from `**Labels:**` line (e.g., `phase-6`)
            - Priority label based on `[P0-3]` tag
            - Type label: `enhancement`, `bug`, `tech-debt`, or `documentation`
            - `optional` if marked as OPTIONAL
            
            **Create labels if they don't exist:**
            ```bash
            gh label create "phase-6" --description "Phase 6: Sync Engine" --color "0E8A16" || true
            gh label create "priority-critical" --description "P0: Critical priority" --color "B60205" || true
            gh label create "priority-high" --description "P1: High priority" --color "D93F0B" || true
            gh label create "priority-medium" --description "P2: Medium priority" --color "FBCA04" || true
            gh label create "priority-low" --description "P3: Nice to have" --color "0E8A16" || true
            ```

            ## Step 4: Output Summary

            After processing, provide a markdown summary:

            ```markdown
            ## Issue Generation Summary

            **Configuration:**
            - Mode: [Dry Run / Live]
            - Phase Filter: [all / Phase X]
            - Include Optional: [yes/no]
            - Priority Filter: [P0-PX]

            **Results:**
            
            ### Issues Created (or Would Create)
            | # | Title | Labels | Priority |
            |---|-------|--------|----------|
            | 1 | [Phase 6] Implement sync queue | phase-6, enhancement | P1 |
            | ... | ... | ... | ... |

            ### Skipped (Already Exists)
            - "Implement sync queue" → Existing issue #42

            ### Skipped (Completed)
            - [x] Set up Express server with MongoDB connection

            ### Skipped (Filtered Out)
            - "Offline tile caching" - Marked as OPTIONAL
            - "Push notifications" - Below priority threshold (P3)

            **Totals:**
            - Pending items found: X
            - Issues created: Y
            - Duplicates skipped: Z
            - Filtered out: W
            ```

            ## Important Notes

            1. **Dry Run First:** If dry_run is true, DO NOT create issues. Only output what WOULD be created.

            2. **Phase 6 Focus:** The project is currently at Phase 6 (Sync Engine). Unless specified otherwise, prioritize Phase 6 items.

            3. **Respect Existing Structure:** The CLAUDE.md is well-maintained. Don't suggest restructuring it.

            4. **Sub-items Stay Together:** Tasks with nested checkboxes (like the sync engine tasks) should become ONE issue with a checklist body, not multiple issues.

            5. **Link Back:** Each issue body should reference that it came from CLAUDE.md for traceability.

          # Allow Claude to use gh CLI for issue operations
          claude_args: '--allowed-tools "View" "GlobTool" "Bash(gh issue create:*)" "Bash(gh issue list:*)" "Bash(gh issue view:*)" "Bash(gh label create:*)" "Bash(gh label list:*)" "Bash(cat CLAUDE.md)" "Bash(grep:*)" "Bash(head:*)" "Bash(tail:*)"'

      - name: Post summary to triggering issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ inputs.dry_run || steps.parse_comment.outputs.dry_run || 'true' }}' === 'true';
            const mode = dryRun ? '🔍 **Preview Mode**' : '✅ **Issues Created**';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${mode}\n\nIssue generation complete! Check the [Actions tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions) for the full summary.`
            })